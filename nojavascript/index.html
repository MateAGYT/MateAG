<html><head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>MateAG - NoJavaScript</title>
    <link href="/cdn/Content/less/javascript.css" rel="Stylesheet" type="text/css">

    <meta type="robots" content="noindex">

    <style>
        body {
            background-color: #ffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            color: #000;
            font-family: 'Open Sans', sans-serif;
        }
        #nojs {
            padding: 20px;
        }
        #nojs h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        #nojs img {
            max-width: 100%;
            height: auto;
            max-height: 400px;
            display: block;
            margin: 0 auto 20px;
        }
        #nojs a {
            display: inline-block;
            color: #00a2ff;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #00a2ff;
            padding: 10px 20px;
            border-radius: 10px;
            transition: 0.3s;
        }
        #nojs a:hover {
            background-color: #00a2ff;
            color: white;
        }
    </style>
</head>
<body>
    <div id="nojs">
        <h1>Necesitas habilitar JavaScript en el navegador para poder usar esta web.</h1>

        <img src="https://files.catbox.moe/3dddn2.png">
        <a href="http://www.enable-javascript.com/es/" target="_blank">Habilitar Javascript</a>
    </div>


</body></html>
