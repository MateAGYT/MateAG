<html><head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>MateAG - NoJavaScript</title>
    <link href="/cdn/Content/less/javascript.css" rel="Stylesheet" type="text/css">

    <meta type="robots" content="noindex">

    <style>
      body {
  background: url(../images/error/background.jpg) bottom left no-repeat fixed;
  margin: 0;
  padding: 0;
  overflow: hidden;
  text-align: center;
}
#nojs,
#navnocomp {
  text-align: center;
  margin-top: 50px;
}
#nojs h1,
#navnocomp h1 {
  color: white;
  font-family: 'Open Sans';
  font-size: 24px;
}
#nojs img,
#navnocomp img {
  height: 500px;
}
#nojs a,
#navnocomp a {
  display: block;
  color: white;
  text-decoration: none;
  font-family: open sans;
  font-size: 24px;
}
#nojs a:hover,
#navnocomp a:hover {
  color: #c9dcfa;
}
#Info {
  font-family: open sans;
  font-size: 24px;
  color: white;
}
#backgroundBrownser {
  width: 600px;
  height: 100px;
  background: white;
  display: inline-block;
  -moz-border-radius: 20px;
  -webkit-border-radius: 20px;
  -khtml-border-radius: 20px;
  border-radius: 20px;
}
#backgroundBrownser #browserSupport {
  color: #222222;
  font-family: open sans;
}
#backgroundBrownser #navegadores {
  -webkit-padding-start: 0;
}
#backgroundBrownser #navegadores li {
  font-family: open sans;
  display: inline;
  margin: 0 20px;
  font-size: 20px;
}
#backgroundBrownser #navegadores li a {
  color: #222222;
  text-decoration: none;
}
#backgroundBrownser #navegadores li a:hover {
  color: #0072c6;
}</style>
</head>
<body>
    <div id="nojs">
        <h1>Necesita habilitar JavaScript en el navegador para poder usar esta web.</h1>

        <img src="https://files.catbox.moe/3dddn2.png">
        <a href="http://www.enable-javascript.com/es/" target="_blank">Habilitar Javascript</a>
    </div>


</body></html>
